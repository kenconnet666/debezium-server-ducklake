# 发布：推送 tag v* 触发——测试 → 按 tag 定版打包 → GitHub Release 上传 jar
#       → buildx 多架构(amd64/arm64)构建并推送镜像到 Docker Hub + GHCR
# 用法:  git tag v0.1.0 && git push origin v0.1.0
# 前置:  仓库 Settings → Secrets and variables → Actions 配好 DOCKERHUB_USERNAME / DOCKERHUB_TOKEN
#        (token 在 hub.docker.com → Account settings → Personal access tokens 生成,权限 Read & Write)
# 产物:  Release 附件 debezium-server-ducklake-<版本>.jar
#        docker.io/kenconnet/debezium-server-ducklake:<版本> 与 :latest(用户 docker pull 直接用)
#        ghcr.io/<owner>/debezium-server-ducklake:<版本> 与 :latest(备份 registry)
# ⚠️ 首次发布后 GHCR package 默认 private——到 GitHub → Packages → 该包
#    → Package settings → Change visibility 改 public 才能匿名拉取。
#    Docker Hub 仓库 kenconnet/debezium-server-ducklake 首次 push 自动创建(个人命名空间默认 public)。
name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write    # 创建 Release
  packages: write    # 推送 GHCR

env:
  # 构建 JDK 与生产运行时同源:JetBrains Runtime(JBR) 25
  JBR_URL: https://cache-redirector.jetbrains.com/intellij-jbr/jbrsdk-25.0.3-linux-x64-b508.16.tar.gz

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JBR SDK 25
        run: curl -fsSL "$JBR_URL" -o "$RUNNER_TEMP/jbrsdk.tar.gz"

      - name: Set up JBR 25
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/jbrsdk.tar.gz
          java-version: '25'
          cache: maven

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          bash ./mvnw -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build (with tests)
        run: bash ./mvnw -B verify

      - name: Create GitHub Release with jar
        uses: softprops/action-gh-release@v2
        with:
          files: target/debezium-server-ducklake-${{ env.VERSION }}.jar
          generate_release_notes: true

      # ── 多架构镜像 → GHCR ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub 主 registry(用户直接 docker pull)。需仓库 secrets:
      #   DOCKERHUB_USERNAME=kenconnet(登录账号)
      #   DOCKERHUB_TOKEN=该账号的 Personal access token(Read & Write)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 两 registry 共用同一套 tag;repository owner 自动小写(GHCR 要求)
          images: |
            docker.io/kenconnet/debezium-server-ducklake
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/ducklake/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
