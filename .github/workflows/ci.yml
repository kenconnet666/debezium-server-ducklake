# CI：push/PR 全量验证（单测 + Testcontainers 集成测试,ubuntu runner 自带 Docker）
# JDK 用 JetBrains Runtime(JBR) SDK 25——与生产运行时(docker/ducklake/Dockerfile 的 JBR)同源;
# 走 jdkfile 直链(cache-redirector 为 JetBrains 官方分发 CDN),不依赖 setup-java 的
# 发行版目录对 JBR 25 的收录情况
name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

env:
  JBR_URL: https://cache-redirector.jetbrains.com/intellij-jbr/jbrsdk-25.0.3-linux-x64-b508.16.tar.gz

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JBR SDK 25
        run: curl -fsSL "$JBR_URL" -o "$RUNNER_TEMP/jbrsdk.tar.gz"

      - name: Set up JBR 25
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          jdkFile: ${{ runner.temp }}/jbrsdk.tar.gz
          java-version: '25'
          cache: maven

      - name: Test
        run: mvn -B verify
