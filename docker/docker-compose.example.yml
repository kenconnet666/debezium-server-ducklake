# 一键体验栈：PostgreSQL 18(源库+DuckLake catalog) + rustfs(S3) + debezium-server-ducklake
# 使用:
#   1. mvn package -DskipTests
#   2. docker compose -f docker/docker-compose.example.yml up -d --build
#   3. psql -h 127.0.0.1 -p 15432 -U postgres -d postgres -f docs/init-source-db.sql
#   4. 重启 ducklake 容器(初始化脚本晚于首启时): docker compose ... restart ducklake
#   5. 建表写数据,查 watermark: curl http://127.0.0.1:19992/api/ducklake/watermark
# 生产部署请用 prod profile(全环境变量)并替换全部密码。
services:
  postgres:
    image: postgres:18-alpine
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_PASSWORD: changeme
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: admin
      RUSTFS_SECRET_KEY: changeme
    ports:
      - "19000:9000"
    volumes:
      - lakedata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/health || exit 1"]
      interval: 5s
      retries: 10

  bucket-init:
    image: minio/mc
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set rfs http://rustfs:9000 admin changeme
      && mc mb -p rfs/lake && exit 0"

  ducklake:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      bucket-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DUCKLAKE_SOURCE_HOST: postgres
      DUCKLAKE_SOURCE_PORT: "5432"
      DUCKLAKE_SOURCE_USER: dbuser_cdc
      DUCKLAKE_SOURCE_PASSWORD: changeme
      DUCKLAKE_SOURCE_DBNAME: postgres
      DUCKLAKE_CATALOG_HOST: postgres
      DUCKLAKE_CATALOG_PORT: "5432"
      DUCKLAKE_CATALOG_DB: ducklake_catalog
      DUCKLAKE_CATALOG_USER: lake_admin
      DUCKLAKE_CATALOG_PASSWORD: changeme
      DUCKLAKE_DATA_PATH: s3://lake/ducklake/
      DUCKLAKE_S3_ENDPOINT: rustfs:9000
      DUCKLAKE_S3_ACCESS_KEY: admin
      DUCKLAKE_S3_SECRET_KEY: changeme
    ports:
      - "19992:19992"
    deploy:
      resources:
        limits:
          memory: 3072M
    volumes:
      # DuckDB 扩展缓存(首启 INSTALL ducklake/postgres/httpfs 需外网,持久化后重启秒加载)
      - duckdb-ext:/root/.duckdb

volumes:
  pgdata:
  lakedata:
  duckdb-ext:
