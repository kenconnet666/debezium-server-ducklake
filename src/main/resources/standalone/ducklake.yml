# standalone = 单机 compose 形态(.doc/.standalone):全部容器名直连(同一 compose 网络),
# PG/rustfs 无 HAProxy 层;密码经 compose 注入 STACK_PASSWORD
zadmin:
  ducklake:
    source:
      hostname: zpostgres
      port: 5432
      user: dbuser_cdc
      password: ${STACK_PASSWORD}
      dbname: postgres
      slot-name: dbz_ducklake
      publication-name: dbz_publication
    lake:
      catalog-host: zpostgres
      catalog-port: 5432
      catalog-db: ducklake_catalog
      catalog-user: dbuser_zadmin
      catalog-password: ${STACK_PASSWORD}
      data-path: s3://lake/ducklake/
      s3-endpoint: zrustfs:9000
      s3-access-key: ${RUSTFS_ACCESS_KEY:admin}
      s3-secret-key: ${STACK_PASSWORD}
      s3-ssl: false
      # 512/768MB 均实测 OOM crash loop(大批重放+常驻占用顶格,2026-07-08)
      memory-limit: 1536MB
      # 0=自动核数(需容器内存 ≥2.5G);2=已验证稳定值(8 线程在 1.75G 容器实测 OOM)
      threads: 2
    engine:
      snapshot-mode: initial
    maintenance:
      enabled: true
      snapshot-retain-days: 30
