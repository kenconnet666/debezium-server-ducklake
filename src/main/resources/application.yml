spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: debezium-server-ducklake
  lifecycle:
    timeout-per-shutdown-phase: 30s   # 优雅停:引擎 close 等当前批落盘
  threads:
    virtual:
      enabled: true
  # Redis(Redisson,core 传递带入)已作为备用连接接入:连接参数在各 profile 的 ducklake.yml。
  # 曾因 netty 4.1/4.2 混装在 Lettuce 装配时 CNFE(SocketProtocolFamily),
  # 已在 root pom 以 netty-bom(先于 debezium-bom)统一 4.2 根治;集成测试无 Redis,仍按类排除装配。

easy-query:
  build: false   # 与 a_start 同款:数据源由 core 的 MultiDataSourceConfiguration 动态注册

server:
  port: ${SERVER_PORT:19992}
  shutdown: graceful
  servlet:
    context-path: /api/ducklake

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # /api/ducklake/actuator/prometheus 供 VM 抓取(job=ducklake)

---
spring:
  config:
    activate:
      on-profile: dev
    import:
      - optional:classpath:/dev/ducklake.yml

---
spring:
  config:
    activate:
      on-profile: test
    import:
      - optional:classpath:/test/ducklake.yml

---
spring:
  config:
    activate:
      on-profile: standalone   # 单机 compose 形态(.doc/.standalone,容器名直连)
    import:
      - optional:classpath:/standalone/ducklake.yml

---
spring:
  config:
    activate:
      on-profile: prod
    import:
      - optional:classpath:/prod/ducklake.yml
