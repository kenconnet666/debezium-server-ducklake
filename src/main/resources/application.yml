spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: debezium-server-ducklake
  lifecycle:
    timeout-per-shutdown-phase: 30s   # 优雅停:引擎 close 等当前批落盘
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:19992}
  shutdown: graceful
  servlet:
    context-path: /api/ducklake

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # /api/ducklake/actuator/prometheus 供 Prometheus/VictoriaMetrics 抓取

---
spring:
  config:
    activate:
      on-profile: dev      # 本机开发(单机 docker 栈直连)
    import:
      - optional:classpath:/dev/ducklake.yml

---
spring:
  config:
    activate:
      on-profile: prod     # 全环境变量驱动,推荐容器化部署使用
    import:
      - optional:classpath:/prod/ducklake.yml
