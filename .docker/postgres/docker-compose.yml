# PG 源一键体验栈：源库 PG(Debian+Pigsty 可装插件) + 独立元空间 PG + rustfs(S3) + debezium-server-ducklake
# 使用(两模式,共用本文件——app 服务带 profiles:[app]):
#   ── A. 开发:infra 进 docker,主程序在 IntelliJ 里跑(dev profile 连 localhost)──
#      docker compose -f .docker/postgres/docker-compose.yml up -d        # 只起 源库/catalog/S3
#      然后 IDEA 以 dev profile Run(端口/口令见 src/main/resources/dev/ducklake.yml)
#   ── B. 全栈 e2e / 类生产:app 也进容器 ──
#      mvn package -DskipTests
#      docker compose -f .docker/postgres/docker-compose.yml --profile app up -d --build
#      查 watermark: curl http://127.0.0.1:19992/api/ducklake/watermark
# CDC 基建(角色/publication/DDL 审计/signal/心跳表)由 initdb 自动完成,up 即可用。
# 与 MySQL 源栈(.docker/mysql/)互相独立:project/端口/数据目录全错开,可并存同机。
# 布局约定:每个服务一个子目录——Dockerfile 放 <服务>/,持久化数据落 <服务>/data/
# (bind mount,不用 named volume;数据与栈定义同处一树,备份/清理一个目录搞定)。
# 密码/密钥可用同目录 .env 覆盖(模板见 .env.example);不建 .env 也能 up(默认 changeme,
# 仅限本机体验——对外部署必须改)。

name: ducklake-pg

# 日志轮转:长驻容器 json-file 无上限会吃满磁盘
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── 源库:postgres:18-bookworm + pig 扩展仓库(加插件一行 pig ext install <name> -v 18 -y)──
  postgres:
    build: ./postgres
    image: ducklake-pg18
    restart: unless-stopped
    logging: *default-logging
    # PG 并行查询用 /dev/shm,docker 默认 64MB 偏小
    shm_size: 256mb
    command:
      - "postgres"
      # shared_preload 必须启动前就位,initdb 里 CREATE EXTENSION 才能成功
      - "-c"
      - "shared_preload_libraries=pg_stat_statements,auto_explain,pg_stat_kcache,pg_wait_sampling,pg_bigm"
      # 逻辑复制(CDC 前提)
      - "-c"
      - "wal_level=logical"
    environment:
      # initdb 用同一密码建 postgres 超户与 dbuser_cdc(见 postgres/initdb/01-cdc.sh)
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    ports:
      - "15432:5432"
    volumes:
      # postgres:18 起挂载点必须是 /var/lib/postgresql(数据在 18/docker 子目录),
      # 挂容器内 .../data 会被 entrypoint 拒绝(docker-library/postgres#1259)
      - ./postgres/data:/var/lib/postgresql
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 12

  # ── DuckLake 专用元空间 PG(独立实例,同一 pigsty 镜像——以后想给元空间装插件同样一行命令):
  #    POSTGRES_USER/DB 直接建好 lake_admin 与 ducklake_catalog 库,零初始化脚本;
  #    与源库隔离:湖元数据高频小事务不打扰业务,互不殃及 ──
  catalog-pg:
    image: ducklake-pg18
    restart: unless-stopped
    logging: *default-logging
    shm_size: 256mb
    depends_on:
      postgres:
        condition: service_started   # 仅为等 build 产物镜像就绪,无数据依赖
    environment:
      POSTGRES_USER: lake_admin
      POSTGRES_PASSWORD: ${CATALOG_PASSWORD:-changeme}
      POSTGRES_DB: ducklake_catalog
    ports:
      - "15434:5432"
    volumes:
      - ./catalog-pg/data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lake_admin -d ducklake_catalog"]
      interval: 5s
      retries: 12

  # ── S3 对象存储:自建 Debian 镜像(rustfs 官方 gnu 二进制 + mc 客户端 + 基础工具)──
  rustfs:
    build: ./rustfs
    image: ducklake-rustfs
    restart: unless-stopped
    logging: *default-logging
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-admin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-changeme}
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # 管理控制台(http://127.0.0.1:19001,账号=上面 KEY 对)
    volumes:
      - ./rustfs/data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/health || exit 1"]
      interval: 5s
      retries: 10

  # 建桶一次性任务:复用 rustfs 镜像里的 mc(minio client),完成即退出(不设 restart)
  bucket-init:
    image: ducklake-rustfs
    logging: *default-logging
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set rfs http://rustfs:9000 ${RUSTFS_ACCESS_KEY:-admin} ${RUSTFS_SECRET_KEY:-changeme}
      && mc mb -p rfs/lake && exit 0"

  ducklake:
    # profiles=app:plain `up` 只起 infra(供 IDE 开发);全栈 e2e 用 `--profile app up`
    profiles: ["app"]
    build:
      # context 是仓库根:Dockerfile 要 COPY target/*.jar
      context: ../..
      dockerfile: .docker/ducklake/Dockerfile
    # 单写者自愈模型:致命错误进程自杀,交给容器重启从上个 offset 重放(零丢失)
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      catalog-pg:
        condition: service_healthy
      bucket-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DUCKLAKE_SOURCE_HOST: postgres
      DUCKLAKE_SOURCE_PORT: "5432"
      DUCKLAKE_SOURCE_USER: dbuser_cdc
      DUCKLAKE_SOURCE_PASSWORD: ${PG_PASSWORD:-changeme}
      DUCKLAKE_SOURCE_DBNAME: postgres
      DUCKLAKE_CATALOG_HOST: catalog-pg
      DUCKLAKE_CATALOG_PORT: "5432"
      DUCKLAKE_CATALOG_DB: ducklake_catalog
      DUCKLAKE_CATALOG_USER: lake_admin
      DUCKLAKE_CATALOG_PASSWORD: ${CATALOG_PASSWORD:-changeme}
      DUCKLAKE_DATA_PATH: s3://lake/ducklake/
      DUCKLAKE_S3_ENDPOINT: rustfs:9000
      DUCKLAKE_S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-admin}
      DUCKLAKE_S3_SECRET_KEY: ${RUSTFS_SECRET_KEY:-changeme}
    ports:
      - "19992:19992"
    deploy:
      resources:
        limits:
          memory: 3072M
    volumes:
      # DuckDB 扩展缓存(首启 INSTALL ducklake/postgres/httpfs 需外网,持久化后重启秒加载)
      - ./ducklake/data/duckdb-ext:/root/.duckdb
