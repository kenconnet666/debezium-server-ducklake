# MySQL 源一键体验栈：MySQL 8.4(源库) + 元空间 PG + rustfs(S3) + debezium-server-ducklake
# 使用(两模式,共用本文件——app 服务带 profiles:[app]):
#   ── A. 开发:infra 进 docker,主程序在 IntelliJ 里跑 ──
#      docker compose -f .docker/mysql/docker-compose.yml up -d          # 只起 MySQL/catalog/S3
#      注:dev profile 默认连 PG 栈;要以 MySQL 为源在 IDE 跑,给主程序传 prod profile + MySQL 环境变量
#   ── B. 全栈 e2e / 类生产:app 也进容器 ──
#      .\mvnw.cmd package -DskipTests
#      docker compose -f .docker/mysql/docker-compose.yml --profile app up -d --build
#   写数据看落湖: docker compose -f .docker/mysql/docker-compose.yml exec mysql \
#        mysql -uroot -pchangeme shop -e "CREATE TABLE demo(id bigint AUTO_INCREMENT PRIMARY KEY, name varchar(64)); INSERT INTO demo(name) VALUES ('hello'),('mysql');"
#      curl http://127.0.0.1:19993/api/ducklake/watermark
# CDC 基建只有复制账号；无 signal/心跳/publication/DDL 审计表。conf.d 显式钉死 ROW/FULL 契约与 GTID。
# 与 PG 源栈(.docker/postgres/)完全独立:project 名/端口/数据目录全部错开,可并存同机;
# 每服务一个子目录,持久化数据落 <服务>/data/(备份/清理一处搞定)。
# 镜像约定不破例:MySQL 同为自建 Debian 镜像(bookworm-slim + MySQL 官方 APT 仓库清华镜像,
# 见 mysql/Dockerfile)——官方 mysql 镜像是 Oracle Linux base 且 8.4 无 debian 变体。

name: ducklake-mysql

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── 源库:MySQL 8.4 LTS 自建 Debian 镜像(binlog ROW/FULL 默认开;conf.d 补 GTID,
  #    initdb 建 CDC 基建;排障工具 procps/iproute2/less/jq 内置)──
  mysql:
    build: ./mysql
    image: ducklake-mysql84
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      # scanner 默认绑定的业务库（DUCKLAKE_SOURCE_DBNAME 与之对应）
      MYSQL_DATABASE: shop
    ports:
      - "13306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      retries: 20
      start_period: 30s

  # ── DuckLake 元空间 PG（湖 catalog + 原生 MySQL offset）:
  #    官方镜像即可——元空间只存元数据,无需 PG 源栈那套 pigsty 观测扩展 ──
  catalog-pg:
    image: postgres:18-bookworm
    restart: unless-stopped
    logging: *default-logging
    shm_size: 256mb
    environment:
      POSTGRES_USER: lake_admin
      POSTGRES_PASSWORD: ${CATALOG_PASSWORD:-changeme}
      POSTGRES_DB: ducklake_catalog
    ports:
      - "15435:5432"
    volumes:
      # postgres:18 起挂载点必须是 /var/lib/postgresql(数据在 18/docker 子目录)
      - ./catalog-pg/data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lake_admin -d ducklake_catalog"]
      interval: 5s
      retries: 12

  # ── S3 对象存储(与 PG 栈同镜像,独立实例与数据)──
  rustfs:
    build: ./rustfs
    image: ducklake-rustfs
    restart: unless-stopped
    logging: *default-logging
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-admin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-changeme}
    ports:
      - "19010:9000"   # S3 API
      - "19011:9001"   # 管理控制台
    volumes:
      - ./rustfs/data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/health || exit 1"]
      interval: 5s
      retries: 10

  bucket-init:
    image: ducklake-rustfs
    logging: *default-logging
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set rfs http://rustfs:9000 ${RUSTFS_ACCESS_KEY:-admin} ${RUSTFS_SECRET_KEY:-changeme}
      && mc mb -p rfs/lake && exit 0"

  ducklake:
    # profiles=app:plain `up` 只起 infra;全栈 e2e 用 `--profile app up`
    profiles: ["app"]
    build:
      # context 是仓库根:Dockerfile 要 COPY target/*.jar
      context: ../..
      dockerfile: .docker/ducklake/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      mysql:
        condition: service_healthy
      catalog-pg:
        condition: service_healthy
      bucket-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # ── MySQL 源 ──
      DUCKLAKE_SOURCE_TYPE: mysql
      DUCKLAKE_SOURCE_NAME: mysql-shop
      DUCKLAKE_SOURCE_HOST: mysql
      DUCKLAKE_SOURCE_PORT: "3306"
      DUCKLAKE_SOURCE_USER: dbuser_cdc
      DUCKLAKE_SOURCE_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      # scanner 默认绑定库；binlog 捕获范围默认是实例全部用户库
      DUCKLAKE_SOURCE_DBNAME: shop
      # binlog 客户端 ID:必须在 MySQL 集群 server_id/replica 空间内唯一
      DUCKLAKE_SOURCE_SERVER_ID: "6400"
      # ── 元空间（湖 catalog + 原生 offset） ──
      DUCKLAKE_CATALOG_HOST: catalog-pg
      DUCKLAKE_CATALOG_PORT: "5432"
      DUCKLAKE_CATALOG_DB: ducklake_catalog
      DUCKLAKE_CATALOG_USER: lake_admin
      DUCKLAKE_CATALOG_PASSWORD: ${CATALOG_PASSWORD:-changeme}
      # ── S3 ──
      DUCKLAKE_DATA_PATH: s3://lake/ducklake/
      DUCKLAKE_S3_ENDPOINT: rustfs:9000
      DUCKLAKE_S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-admin}
      DUCKLAKE_S3_SECRET_KEY: ${RUSTFS_SECRET_KEY:-changeme}
      DUCKLAKE_DATA_INLINING_ROW_LIMIT: ${DUCKLAKE_DATA_INLINING_ROW_LIMIT:-512}
      DUCKLAKE_MAX_RETRY_COUNT: ${DUCKLAKE_MAX_RETRY_COUNT:-20}
    ports:
      - "19993:19992"
    deploy:
      resources:
        limits:
          memory: 3072M
    volumes:
      # named volume 会继承镜像内 uid=10001，首启 INSTALL 后可由非 root 应用持续复用。
      - ducklake-ext:/home/ducklake/.duckdb

volumes:
  ducklake-ext:
